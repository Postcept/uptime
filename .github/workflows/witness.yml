name: witness

# Anchors the Postcept transparency log's signed tree head to the public
# Sigstore Rekor transparency service. The checkpoint carries only tree size,
# root hash, timestamp and Postcept's signature: no receipts, no tenant or
# provider identifiers, no amounts. The signature is keyless (GitHub OIDC), so
# the Rekor entry is bound to this repository and this workflow, and the
# inclusion material is verified here before anything is reported as witnessed.
# Verification and receipt issuance never depend on this job: a Rekor outage
# only delays the next witness.
on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  anchor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # OIDC for keyless signing, granted to this job only
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Fetch the signed tree head
        id: sth
        run: |
          set -euo pipefail
          curl -fsS --max-time 60 https://api.postcept.com/v1/transparency/sth > sth.json
          digest=$(sha256sum sth.json | cut -d' ' -f1)
          tree_size=$(python3 -c "import json;print(json.load(open('sth.json'))['tree_size'])")
          root_hash=$(python3 -c "import json;print(json.load(open('sth.json'))['root_hash'])")
          last=$(python3 -c "import json;print(json.load(open('witness/latest.json'))['checkpoint_digest'])" 2>/dev/null || echo none)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "tree_size=$tree_size" >> "$GITHUB_OUTPUT"
          echo "root_hash=$root_hash" >> "$GITHUB_OUTPUT"
          if [ "$digest" = "$last" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "checkpoint unchanged, nothing to anchor"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Sign the checkpoint into Rekor
        if: steps.sth.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cosign sign-blob --yes --bundle bundle.json sth.json
      - name: Verify the inclusion material before claiming anything
        if: steps.sth.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cosign verify-blob \
            --bundle bundle.json \
            --certificate-identity-regexp "^https://github.com/Postcept/uptime/\.github/workflows/witness\.yml@" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            sth.json
      - name: Commit the bundle to the public witness history
        if: steps.sth.outputs.changed == 'true'
        id: store
        run: |
          set -euo pipefail
          month=$(date -u +%Y-%m)
          name="${{ steps.sth.outputs.tree_size }}-${{ steps.sth.outputs.digest }}"
          mkdir -p "witness/$month"
          cp sth.json "witness/$month/$name.sth.json"
          cp bundle.json "witness/$month/$name.bundle.json"
          log_index=$(python3 -c "
          import base64, json
          b = json.load(open('bundle.json'))
          print(b.get('rekorBundle', {}).get('Payload', {}).get('logIndex', ''))")
          printf '{\n "checkpoint_digest": "%s",\n "tree_size": %s,\n "root_hash": "%s",\n "rekor_log_index": "%s",\n "bundle": "witness/%s/%s.bundle.json"\n}\n' \
            "${{ steps.sth.outputs.digest }}" "${{ steps.sth.outputs.tree_size }}" \
            "${{ steps.sth.outputs.root_hash }}" "$log_index" "$month" "$name" > witness/latest.json
          echo "log_index=$log_index" >> "$GITHUB_OUTPUT"
          echo "bundle_path=witness/$month/$name.bundle.json" >> "$GITHUB_OUTPUT"
          git config user.name "postcept-uptime"
          git config user.email "uptime@users.noreply.github.com"
          git add witness
          git pull --rebase --autostash
          git commit -m "witness tree_size=${{ steps.sth.outputs.tree_size }}"
          git push
      - name: Report the verified witness to the API
        if: steps.sth.outputs.changed == 'true'
        env:
          TOKEN: ${{ secrets.INTERNAL_TASK_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "INTERNAL_TASK_TOKEN not set, the bundle is committed and the report waits"
            exit 0
          fi
          idx="${{ steps.store.outputs.log_index }}"
          curl -fsS -X POST https://api.postcept.com/v1/internal/witness \
            -H "X-Internal-Token: $TOKEN" -H "content-type: application/json" \
            --max-time 60 \
            -d "{
              \"checkpoint_digest\": \"${{ steps.sth.outputs.digest }}\",
              \"tree_size\": ${{ steps.sth.outputs.tree_size }},
              \"root_hash\": \"${{ steps.sth.outputs.root_hash }}\",
              \"rekor_log_index\": ${idx:-null},
              \"bundle_url\": \"https://github.com/Postcept/uptime/blob/main/${{ steps.store.outputs.bundle_path }}\"
            }" || echo "report failed, the committed bundle is still the source of truth"
