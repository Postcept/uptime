name: probe

# Probes the public Postcept API from GitHub's runners, which are outside the
# Render and Supabase accounts that run production, and appends the result to an
# append-only history file. Runs on a schedule and can be triggered by hand.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Probe
        run: |
          ts=$(date -u +%FT%TZ)
          month=$(date -u +%Y-%m)
          file="history/$month.jsonl"
          for ep in readyz v1/signing-key v1/transparency/sth; do
            start=$(date +%s%3N)
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://api.postcept.com/$ep" || echo 000)
            end=$(date +%s%3N)
            echo "{\"ts\":\"$ts\",\"endpoint\":\"$ep\",\"status\":$code,\"ms\":$((end-start))}" >> "$file"
          done
      # The API repo's own scheduled workflow stops firing if that repo sees no
      # commits for 60 days (GitHub disables cron in inactive repos). This repo
      # commits every 15 minutes forever, so the platform backstops ride here:
      # webhook delivery retries hourly, verification re-checks and usage
      # reconciliation every six hours. No-ops until the INTERNAL_TASK_TOKEN
      # secret is set to the same value the API holds.
      - name: Run the platform backstops
        env:
          TOKEN: ${{ secrets.INTERNAL_TASK_TOKEN }}
        run: |
          if [ -z "${TOKEN:-}" ]; then
            echo "INTERNAL_TASK_TOKEN not set, skipping backstops"
            exit 0
          fi
          hour=$(date -u +%H); minute=$(date -u +%M)
          if [ "$minute" -lt 15 ]; then
            curl -fsS -X POST "https://api.postcept.com/v1/internal/deliver-webhooks?limit=200"               -H "X-Internal-Token: $TOKEN" --max-time 120 || echo "webhook backstop failed"
          fi
          if [ "$minute" -lt 15 ] && [ $((10#$hour % 6)) -eq 0 ]; then
            curl -fsS -X POST "https://api.postcept.com/v1/internal/reconcile-verifications?limit=200"               -H "X-Internal-Token: $TOKEN" --max-time 300 || echo "re-verify backstop failed"
            curl -fsS -X POST "https://api.postcept.com/v1/internal/reconcile-usage"               -H "X-Internal-Token: $TOKEN" --max-time 120 || echo "usage backstop failed"
          fi
          # The live canary: a scripted refund lifecycle against each configured
          # provider sandbox, daily at 06 UTC. The registry's last_verified stamp
          # comes from these runs.
          if [ "$minute" -lt 15 ] && [ "$hour" = "06" ]; then
            curl -fsS -X POST "https://api.postcept.com/v1/internal/canary" -H "X-Internal-Token: $TOKEN" --max-time 300 || echo "canary run failed"
          fi
      - name: Render the status page
        run: python3 scripts/render_status.py
      - name: Commit history and page
        run: |
          git config user.name "postcept-uptime"
          git config user.email "uptime@users.noreply.github.com"
          git add history docs
          git diff --quiet --cached || git commit -m "probe $(date -u +%FT%TZ)"
          git push
