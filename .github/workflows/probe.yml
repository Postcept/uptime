name: probe

# Probes the public Postcept API from GitHub's runners, which are outside the
# Render and Supabase accounts that run production, and appends the result to an
# append-only history file. Runs on a schedule and can be triggered by hand.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Probe
        run: |
          ts=$(date -u +%FT%TZ)
          month=$(date -u +%Y-%m)
          file="history/$month.jsonl"
          for ep in readyz v1/signing-key v1/transparency/sth; do
            start=$(date +%s%3N)
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://api.postcept.com/$ep" || echo 000)
            end=$(date +%s%3N)
            echo "{\"ts\":\"$ts\",\"endpoint\":\"$ep\",\"status\":$code,\"ms\":$((end-start))}" >> "$file"
          done
      - name: Commit history
        run: |
          git config user.name "postcept-uptime"
          git config user.email "uptime@users.noreply.github.com"
          git add history
          git diff --quiet --cached || git commit -m "probe $(date -u +%FT%TZ)"
          git push
